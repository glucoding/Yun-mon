apiVersion: v2
name: yun-mon
description: Yun-mon 统一监测控制台 Kubernetes 部署
type: application
version: 0.2.0
appVersion: "0.2.0"
home: https://github.com/example/yun-mon
maintainers:
  - name: Yun-mon
dependencies:
  - name: kube-prometheus-stack
    version: ">=66.0.0"
    repository: https://prometheus-community.github.io/helm-charts
    condition: kubePrometheusStack.enabled
  - name: loki
    version: ">=6.0.0"
    repository: https://grafana.github.io/helm-charts
    condition: loki.enabled
  - name: promtail
    version: ">=6.0.0"
    repository: https://grafana.github.io/helm-charts
    condition: promtail.enabled
