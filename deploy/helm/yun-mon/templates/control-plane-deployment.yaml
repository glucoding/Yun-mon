apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "yunmon.fullname" . }}-control-plane
  labels:
    {{- include "yunmon.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  replicas: {{ .Values.controlPlane.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: yun-mon-control-plane
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: yun-mon-control-plane
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: control-plane
    spec:
      containers:
        - name: control-plane
          image: "{{ .Values.controlPlane.image.repository }}:{{ .Values.controlPlane.image.tag }}"
          imagePullPolicy: {{ .Values.controlPlane.image.pullPolicy }}
          ports:
            - containerPort: 8090
          env:
            - name: CONTROL_PLANE_HTTP_PORT
              value: "8090"
            - name: MONITORING_PROJECT
              value: {{ .Values.system.monitoringProject | quote }}
            {{- range $key, $value := .Values.controlPlane.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 30
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "yunmon.fullname" . }}-control-plane
  labels:
    {{- include "yunmon.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  type: {{ .Values.controlPlane.service.type }}
  selector:
    app.kubernetes.io/name: yun-mon-control-plane
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.controlPlane.service.port }}
      targetPort: 8090
      protocol: TCP
      name: http
