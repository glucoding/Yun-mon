name: ${MONITORING_PROJECT:-yun-mon}

services:
  demo-service:
    build:
      context: ./apps/demo-service
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_LOG_DIR: ${DEMO_SERVICE_LOG_DIR:-/var/log/yunmon}
      JAVA_OPTS: ${DEMO_SERVICE_JAVA_OPTS:--XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0}
    labels:
      monitoring_enabled: "${DEMO_SERVICE_MONITORING_ENABLED:-true}"
      monitoring_port: "${DEMO_SERVICE_MONITORING_PORT:-8080}"
      service_name: "${DEMO_SERVICE_SERVICE_NAME:-demo-service}"
      monitoring_metrics_path: "${DEMO_SERVICE_METRICS_PATH:-/actuator/prometheus}"
    ports:
      - "${DEMO_SERVICE_HOST_PORT:-18080}:8080"
    volumes:
      - demo-service-logs:/var/log/yunmon
    networks:
      - monitoring-net

  control-plane:
    build:
      context: ./apps/control-plane
    environment:
      CONTROL_PLANE_WORKSPACE: /workspace
      CONTROL_PLANE_HTTP_PORT: 8090
      MONITORING_PROJECT: ${MONITORING_PROJECT:-yun-mon}
      DOCKER_SOCKET: /var/run/docker.sock
    labels:
      monitoring_enabled: "true"
      monitoring_port: "8090"
      service_name: "control-plane"
      monitoring_metrics_path: "/metrics"
    ports:
      - "${CONTROL_PLANE_HOST_PORT:-18090}:8090"
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring-net

  docker-stats-exporter:
    build:
      context: ./infra/docker-stats-exporter
    environment:
      TARGET_COMPOSE_PROJECT: ${DOCKER_STATS_EXPORTER_TARGET_PROJECT:-yun-mon}
      EXPORTER_MAX_WORKERS: ${DOCKER_STATS_EXPORTER_MAX_WORKERS:-8}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring-net

  prometheus:
    image: prom/prometheus:v3.2.1
    user: "0:0"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_HOST_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/file_sd:/etc/prometheus/file_sd:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - cadvisor
      - alertmanager
      - demo-service
      - docker-stats-exporter
      - control-plane
    networks:
      - monitoring-net

  alertmanager:
    image: prom/alertmanager:v0.28.1
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "${ALERTMANAGER_HOST_PORT:-9093}:9093"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - monitoring-net

  loki:
    image: grafana/loki:3.4.2
    command:
      - -config.file=/etc/loki/loki-config.yml
    ports:
      - "${LOKI_HOST_PORT:-3100}:3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - monitoring-net

  promtail:
    image: grafana/promtail:3.4.2
    command:
      - -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - demo-service-logs:/var/log/yunmon:ro
      - promtail-data:/tmp
    networks:
      - monitoring-net

  grafana:
    image: grafana/grafana:11.5.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123456}
      GF_USERS_ALLOW_SIGN_UP: ${GRAFANA_ALLOW_SIGN_UP:-false}
    ports:
      - "${GRAFANA_HOST_PORT:-13000}:3000"
    depends_on:
      - prometheus
      - loki
      - alertmanager
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - monitoring-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    privileged: true
    command:
      - --docker_only=${CADVISOR_DOCKER_ONLY:-true}
      - --housekeeping_interval=${CADVISOR_HOUSEKEEPING_INTERVAL:-30s}
    ports:
      - "${CADVISOR_HOST_PORT:-8081}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - monitoring-net

networks:
  monitoring-net:
    driver: bridge

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
  alertmanager-data:
  promtail-data:
  demo-service-logs:
