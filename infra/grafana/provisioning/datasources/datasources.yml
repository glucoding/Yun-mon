apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      derivedFields:
        - datasourceUid: loki
          matcherRegex: "traceId=([A-Za-z0-9\\-]+)"
          name: traceId
          url: "${__value.raw}"

# 注:Alertmanager datasource 默认在 Grafana 11 OSS 上插件不可用,
# 本项目告警走 Prometheus -> Alertmanager 直连链路,Grafana 不参与
# 告警执行,不需要该 datasource。如需在 Grafana 管理 silence,可参考
# https://grafana.com/docs/grafana/latest/datasources/alertmanager/ 手动配置。

