global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    cluster: yun-mon-local
    env: local
rule_files:
- /etc/prometheus/rules/*.yml
scrape_configs:
- job_name: prometheus
  static_configs:
  - targets:
    - prometheus:9090
    labels:
      service: prometheus
- job_name: cadvisor
  static_configs:
  - targets:
    - cadvisor:8080
    labels:
      service: cadvisor
- job_name: loki
  metrics_path: /metrics
  static_configs:
  - targets:
    - loki:3100
    labels:
      service: loki
- job_name: control_plane
  metrics_path: /metrics
  static_configs:
  - targets:
    - control-plane:8090
    labels:
      service: control-plane
- job_name: stack_agent
  metrics_path: /metrics
  static_configs:
  - targets:
    - host.docker.internal:19090
    labels:
      service: stack-agent
- job_name: applications
  file_sd_configs:
  - files:
    - /etc/prometheus/file_sd/applications-targets.json
    refresh_interval: 30s
alerting:
  alertmanagers:
  - static_configs:
    - targets:
      - alertmanager:9093
