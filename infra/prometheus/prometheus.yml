global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    cluster: yun-mon-local
    env: local

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090
        labels:
          service: prometheus

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
        labels:
          service: cadvisor

  - job_name: docker_stats_exporter
    static_configs:
      - targets:
          - docker-stats-exporter:9115
        labels:
          service: docker-stats-exporter

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100
        labels:
          service: loki

  - job_name: applications
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s
    relabel_configs:
      - source_labels:
          - __meta_docker_container_label_monitoring_enabled
        regex: true
        action: keep
      - source_labels:
          - __meta_docker_port_private
        regex: "8080"
        action: keep
      - source_labels:
          - __meta_docker_container_label_monitoring_metrics_path
        regex: (.+)
        target_label: __metrics_path__
        replacement: $1
      - source_labels:
          - __meta_docker_container_label_service_name
        regex: (.+)
        target_label: service
        replacement: $1
      - source_labels:
          - __meta_docker_container_name
        regex: /?(.*)
        target_label: container
        replacement: $1
      - source_labels:
          - __meta_docker_container_label_com_docker_compose_service
        regex: (.+)
        target_label: compose_service
        replacement: $1

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093
