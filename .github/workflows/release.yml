name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  control-plane-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push control-plane
        uses: docker/build-push-action@v6
        with:
          context: ./apps/control-plane
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/yun-mon-control-plane:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/yun-mon-control-plane:latest

  demo-service-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push demo-service
        uses: docker/build-push-action@v6
        with:
          context: ./apps/demo-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/yun-mon-demo-service:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/yun-mon-demo-service:latest
